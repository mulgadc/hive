version: "2"

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: false # modernize linter covers gofmt -s simplifications (Go 1.23+)

linters:
  enable:
    - asasalint # catches pass []any as any in variadic func(...any)
    - asciicheck # checks that code does not contain non-ASCII identifiers
    - bidichk # checks for dangerous unicode bidi character sequences
    - bodyclose # checks whether HTTP response body is closed successfully
    - canonicalheader # checks whether net/http.Header uses canonical header keys
    - durationcheck # checks for two durations multiplied together
    - embeddedstructfieldcheck # checks embedded sync.Mutex/RWMutex in structs
    - errcheck # checks for unchecked errors in type assertions and I/O
    - errname # checks that sentinel errors are prefixed with Err, error types suffixed with Error
    - errorlint # finds code that will cause problems with Go 1.13+ error wrapping
    - exhaustive # checks exhaustiveness of enum switch statements and maps
    - exptostd # detects golang.org/x/exp/ functions replaceable by stdlib
    - fatcontext # detects nested contexts in loops
    - gocheckcompilerdirectives # validates go compiler directive comments (//go:)
    - goprintffuncname # checks that printf-like functions are named with f at the end
    - gosec # inspects source code for security problems
    - govet # reports suspicious constructs (Printf alignment, shadow, etc.)
    - ineffassign # detects assignments to existing variables that are not used
    - makezero # finds slice declarations with non-zero initial length followed by append
    - mirror # catches wrong mirror patterns in bytes/strings usage
    - modernize # modernizes code to use newer Go idioms (go fix analyzers)
    - nakedret # finds naked returns in functions
    - nilerr # catches code that returns nil even after checking err != nil
    - nilnesserr # catches returning a different nil error variable after err != nil check
    - noctx # finds HTTP requests sent without context.Context
    - nolintlint # reports ill-formed or insufficient nolint directives
    - nosprintfhostport # checks for misuse of Sprintf to construct host:port (breaks IPv6)
    - predeclared # catches shadowing of Go builtins (len, cap, error, etc.)
    - reassign # checks that package variables are not reassigned
    - recvcheck # checks for receiver type consistency (pointer vs value)
    - sloglint # enforces consistent log/slog usage (key-value pairs, no globals)
    - staticcheck # extensive static analysis checks
    - unconvert # removes unnecessary type conversions
    - unparam # reports unused function parameters
    - usestdlibvars # detects hardcoded values that should use stdlib constants
    - usetesting # catches os.TempDir() etc. in tests — should use t.TempDir()
    - wastedassign # finds assignments to variables that are never subsequently read
    - whitespace # detects leading and trailing whitespace in functions

  settings:
    embeddedstructfieldcheck:
      forbid-mutex: true

    errcheck:
      check-type-assertions: true

    exhaustive:
      check:
        - switch
        - map

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow # too noisy to retrofit — all 50 findings are err re-declarations

    staticcheck:
      checks:
        - all
        - -ST1000 # package comment
        - -ST1003 # naming conventions (Id→ID etc.) — too noisy to retrofit
        - -ST1012 # error var naming — errname covers this + error type suffixes
        - -ST1013 # HTTP status constants — usestdlibvars is broader
        - -ST1016 # receiver name consistency (too noisy to retrofit)
        - -ST1020 # godoc on exported types — not enforcing yet
        - -ST1021 # godoc on exported type groups — not enforcing yet
        - -ST1022 # godoc on exported vars/consts — not enforcing yet
        - -SA1019 # deprecated usage (handle separately)
        - -SA4006 # value overwritten — ineffassign + wastedassign cover this better
        - -SA9005 # ineffective break (staticcheck false positives)

    gosec:
      excludes:
        - G104 # unchecked errors — errcheck is stricter
        - G116 # bidi chars — bidichk is more thorough
        - G117 # use of net/http serve functions (we handle TLS separately)
        - G703 # error string formatting
        - G705 # error string formatting
        - G706 # error string formatting

    modernize:
      # Match current go fix exclusions (GOFIX_EXCLUDE := -newexpr=false -stringsbuilder=false)
      disable:
        - newexpr # don't replace aws.String() with new() — AWS SDK idiom
        - stringsbuilder # don't replace small string concatenations with strings.Builder

    sloglint:
      no-global: all
      context: scope

    nakedret:
      max-func-lines: 0

    nolintlint:
      require-explanation: true
      require-specific: true

    reassign:
      patterns:
        - ".*"

    usetesting:
      os-temp-dir: true

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      # tests: relax certain linters
      - path: '_test\.go'
        linters:
          - bodyclose
          - errcheck
          - gosec
          - noctx
      # spinifex-specific: gosec exclusions
      - path: "cmd/"
        linters: [gosec] # matches current -exclude-dir=cmd
      - text: "G204"
        linters: [gosec] # subprocess execution — legitimate in VM orchestration
      - text: "G304"
        linters: [gosec] # file path from variable — necessary for config loading
      - text: "G402"
        linters: [gosec] # TLS config — we handle TLS ourselves
