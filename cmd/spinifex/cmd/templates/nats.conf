# spinifex-config-version: 3
# NATS Server Configuration
# Generated by Spinifex admin init

# Server configuration
{{- if .BindIP }}
listen: {{.BindIP}}:4222
{{- else }}
listen: 0.0.0.0:4222
{{- end }}

tls {
  cert_file: "{{.ConfigDir}}/server.pem"
  key_file:  "{{.ConfigDir}}/server.key"
  ca_file:   "{{.ConfigDir}}/ca.pem"
}

{{- if and .ClusterBindIP .ClusterRoutes }}

cluster {
  name: {{ .ClusterName }}
  listen: {{.ClusterBindIP}}:4248

  tls {
    cert_file: "{{.ConfigDir}}/server.pem"
    key_file:  "{{.ConfigDir}}/server.key"
    ca_file:   "{{.ConfigDir}}/ca.pem"
    verify:    true
  }

  routes = [
{{- range .ClusterRoutes }}
    "nats-route://{{$.NatsToken}}@{{ . }}",
{{- end }}
  ]
}
{{- end }}

server_name: spinifex-nats-{{.Node}}

# Authorization
authorization {
  token: "{{.NatsToken}}"
}

# JetStream for persistent messaging and KV store
jetstream {
  store_dir: "{{.DataDir}}/nats/"
  max_memory_store: 1GB
  max_file_store: 10GB
}

# Logging
debug: false
trace: false
logtime: true
log_file: "{{.LogDir}}/nats.log"

# Limits
max_connections: 1000
max_payload: 1MB
max_pending: 64MB

# Monitoring
http: 127.0.0.1:8222

