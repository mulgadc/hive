---
- name: Dev install — build, install, init, smoketest (idempotent)
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../vars/defaults.yml

  pre_tasks:
    - name: preflight
      ansible.builtin.include_role:
        name: preflight

    - name: health — config file present?
      ansible.builtin.stat:
        path: "{{ spinifex_config_file }}"
      register: health_config

    - name: health — spinifex.target active?
      become: true
      ansible.builtin.command: systemctl is-active spinifex.target
      register: health_target
      changed_when: false
      failed_when: false

    - name: health — awsgw responds?
      become: true
      become_user: "{{ spinifex_invoking_user }}"
      environment:
        AWS_PROFILE: spinifex
      ansible.builtin.command: aws ec2 describe-regions
      register: health_gw
      changed_when: false
      failed_when: false

    - name: health — spx binary installed?
      ansible.builtin.stat:
        path: /usr/local/bin/spx
      register: health_spx

    - name: health — set already_installed fact
      ansible.builtin.set_fact:
        spinifex_already_installed: >-
          {{ health_config.stat.exists
             and health_spx.stat.exists
             and (health_target.stdout | trim) == 'active'
             and health_gw.rc == 0 }}

    - name: health — summary
      ansible.builtin.debug:
        msg: |
          Health:
            spx binary: {{ 'present' if health_spx.stat.exists else 'missing' }}
            config:     {{ 'present' if health_config.stat.exists else 'missing' }}
            target:     {{ health_target.stdout | trim }}
            awsgw:      {{ 'ok' if health_gw.rc == 0 else 'not responding' }}
          Already installed: {{ spinifex_already_installed }}
          {% if spinifex_already_installed %}
          → Skipping build/install/init. Smoketest only.
          {% else %}
          → Running full build → install → init → smoketest.
          {% endif %}

  roles:
    - { role: build, when: not (spinifex_already_installed | default(false)) }
    - { role: install, when: not (spinifex_already_installed | default(false)) }
    - { role: init, when: not (spinifex_already_installed | default(false)) }
    - smoketest
