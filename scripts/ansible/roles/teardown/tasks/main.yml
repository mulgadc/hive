---
- name: guard — detect node count in spinifex.toml
  ansible.builtin.shell: |
    set -e
    if [ -f {{ spinifex_config_file | quote }} ]; then
      grep -cE '^\[nodes\.[^.]+\]' {{ spinifex_config_file | quote }} || echo 0
    else
      echo 0
    fi
  register: teardown_node_count
  changed_when: false

- name: guard — refuse to run on multi-node cluster
  ansible.builtin.assert:
    that: teardown_node_count.stdout | int <= 1
    fail_msg: >-
      Multi-node cluster detected ({{ teardown_node_count.stdout }} nodes in
      {{ spinifex_config_file }}). Teardown supports single-node only;
      use 'spx admin cluster shutdown' per node.

- name: services — stop spinifex.target
  become: true
  ansible.builtin.systemd:
    name: spinifex.target
    state: stopped
  failed_when: false

- name: services — reset failed state (spinifex-* scope only)
  become: true
  ansible.builtin.command: systemctl reset-failed 'spinifex-*'
  changed_when: false
  failed_when: false

- name: processes — kill spinifex processes (SIGTERM, escalate to SIGKILL after 5s)
  become: true
  ansible.builtin.shell: |
    pids=$(pgrep -af "{{ spinifex_process_pattern }}" \
      | grep -vE "{{ spinifex_process_exclude }}" \
      | awk '{print $1}')
    if [ -n "$pids" ]; then
      kill $pids 2>/dev/null || true
      sleep 5
      pids=$(pgrep -af "{{ spinifex_process_pattern }}" \
        | grep -vE "{{ spinifex_process_exclude }}" \
        | awk '{print $1}')
      if [ -n "$pids" ]; then
        kill -9 $pids 2>/dev/null || true
      fi
    fi
  changed_when: false
  failed_when: false

- name: processes — wait for exit (up to {{ teardown_process_wait_seconds }}s)
  become: true
  ansible.builtin.shell: |
    for i in $(seq 1 {{ teardown_process_wait_seconds }}); do
      pids=$(pgrep -af "{{ spinifex_process_pattern }}" \
        | grep -vE "{{ spinifex_process_exclude }}" \
        | awk '{print $1}')
      if [ -z "$pids" ]; then
        exit 0
      fi
      sleep 1
    done
    echo "still running after {{ teardown_process_wait_seconds }}s:" >&2
    pgrep -af "{{ spinifex_process_pattern }}" \
      | grep -vE "{{ spinifex_process_exclude }}" >&2 || true
    exit 1
  changed_when: false

- name: qemu — kill lingering VMs
  become: true
  ansible.builtin.command: "pkill -x {{ item }}"
  loop: "{{ spinifex_qemu_processes }}"
  changed_when: false
  failed_when: false

- name: qemu — wait for exit (up to {{ teardown_process_wait_seconds }}s)
  become: true
  ansible.builtin.shell: |
    set -e
    for i in $(seq 1 {{ teardown_process_wait_seconds }}); do
      alive=0
      for proc in {{ spinifex_qemu_processes | join(' ') }}; do
        if pgrep -x "$proc" >/dev/null 2>&1; then alive=1; break; fi
      done
      if [ "$alive" = "0" ]; then exit 0; fi
      sleep 1
    done
    echo "QEMU still running after {{ teardown_process_wait_seconds }}s" >&2
    exit 1
  changed_when: false

- name: state-dirs — remove production dirs
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ spinifex_etc_dir }}"
    - "{{ spinifex_data_dir }}"
    - "{{ spinifex_log_dir }}"
    - "{{ spinifex_run_dir }}"

- name: state-dirs — remove legacy $HOME/spinifex (opt-in)
  become: true
  become_user: "{{ spinifex_invoking_user }}"
  ansible.builtin.file:
    path: "{{ spinifex_legacy_home_dir }}"
    state: absent
  when: spinifex_wipe_legacy_home | bool

- name: ovs — detect tooling
  ansible.builtin.command: which ovs-vsctl
  register: teardown_ovs_which
  changed_when: false
  failed_when: false

- name: ovs — ensure openvswitch-switch is running for cleanup
  become: true
  ansible.builtin.systemd:
    name: openvswitch-switch
    state: started
  when: teardown_ovs_which.rc == 0
  failed_when: false

- name: ovs — list bridges
  become: true
  ansible.builtin.command: ovs-vsctl list-br
  register: teardown_ovs_brs
  changed_when: false
  failed_when: false
  when: teardown_ovs_which.rc == 0

- name: ovs — delete all bridges
  become: true
  ansible.builtin.command: "ovs-vsctl --if-exists del-br {{ item }}"
  loop: "{{ teardown_ovs_brs.stdout_lines | default([]) }}"
  changed_when: true
  when: teardown_ovs_which.rc == 0

- name: ovs — clear external_ids
  become: true
  ansible.builtin.command: ovs-vsctl --if-exists clear Open_vSwitch . external_ids
  changed_when: true
  failed_when: false
  when: teardown_ovs_which.rc == 0

- name: ovs — stop openvswitch-switch after cleanup
  become: true
  ansible.builtin.systemd:
    name: openvswitch-switch
    state: stopped
  when: teardown_ovs_which.rc == 0
  failed_when: false

- name: ovn — stop ovn-central
  become: true
  ansible.builtin.systemd:
    name: ovn-central
    state: stopped
  failed_when: false

- name: ovn — stop ovn-controller
  become: true
  ansible.builtin.systemd:
    name: ovn-controller
    state: stopped
  failed_when: false

- name: ovn — delete NB/SB DB files
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ovn_nb_db }}"
    - "{{ ovn_sb_db }}"

- name: netlink — enumerate spinifex-managed veth/tap
  ansible.builtin.shell: |
    ip -o link show | awk -F': ' '{print $2}' | cut -d'@' -f1 | \
      grep -E '^(veth-wan-br|veth-wan-ovs|spx-ext-|spx-tap-|spx-)' || true
  register: teardown_links
  changed_when: false

- name: netlink — delete enumerated interfaces
  become: true
  ansible.builtin.command: "ip link delete {{ item }}"
  loop: "{{ teardown_links.stdout_lines }}"
  changed_when: true
  failed_when: false

- name: trust — remove spinifex CA from system store
  become: true
  ansible.builtin.file:
    path: "{{ spinifex_ca_trust_path }}"
    state: absent
  register: teardown_ca_removed

- name: trust — rebuild CA bundle (without --fresh, preserve other CAs)
  become: true
  ansible.builtin.command: update-ca-certificates
  changed_when: true
  when: teardown_ca_removed.changed

- name: user-owned — remove spinifex profile from AWS credentials (opt-in)
  become: true
  become_user: "{{ spinifex_invoking_user }}"
  ansible.builtin.blockinfile:
    path: "~/.aws/credentials"
    marker: "# {mark} SPINIFEX MANAGED BLOCK"
    block: ""
    state: absent
  when: spinifex_wipe_aws_creds | bool
  failed_when: false

- name: user-owned — remove spinifex SSH key (opt-in)
  become: true
  become_user: "{{ spinifex_invoking_user }}"
  ansible.builtin.file:
    path: "~/.ssh/{{ item }}"
    state: absent
  loop:
    - spinifex-key
    - spinifex-key.pub
  when: spinifex_wipe_ssh_keys | bool

- name: summary
  ansible.builtin.debug:
    msg: |
      Teardown complete. Catalog: roles/teardown/README.md
        systemd : spinifex.target stopped, spinifex-* failed cleared
        procs   : {{ spinifex_process_pattern }}
        qemu    : {{ spinifex_qemu_processes | join(', ') }}
        dirs    : {{ spinifex_etc_dir }}, {{ spinifex_data_dir }}, {{ spinifex_log_dir }}, {{ spinifex_run_dir }}{{ ', ' ~ spinifex_legacy_home_dir if spinifex_wipe_legacy_home else '' }}
        ovs     : all bridges deleted, external_ids cleared
        ovn     : NB/SB DB files removed
        netlink : {{ teardown_links.stdout_lines | length }} interface(s) removed
        trust   : {{ spinifex_ca_trust_path }} removed{% if spinifex_wipe_aws_creds %}
        aws     : credentials block removed{% endif %}{% if spinifex_wipe_ssh_keys %}
        ssh     : spinifex-key pair removed{% endif %}
