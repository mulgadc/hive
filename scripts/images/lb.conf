# LB system image manifest
# Used by build-system-image.sh to create an Alpine AMI with HAProxy + lb-agent

IMAGE_NAME="lb"
IMAGE_DESCRIPTION="LB VM with HAProxy and lb-agent"
ALPINE_VERSION="3.21.6"
IMAGE_SIZE="192M"

# Packages to install via apk
APK_PACKAGES="haproxy curl ca-certificates"

# Binaries to copy into the image (source:destination)
INSTALL_BINARIES="bin/lb-agent:/usr/local/bin/lb-agent"

# Build command for binaries (run before image build)
BUILD_COMMANDS="make build-lb-agent"

# OpenRC services to enable at boot
ENABLE_SERVICES="haproxy"

# Custom setup script (runs inside chroot after packages are installed)
SETUP_SCRIPT="scripts/images/lb-setup.sh"
