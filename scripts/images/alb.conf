# ALB system image manifest
# Used by build-system-image.sh to create an Alpine AMI with HAProxy + alb-agent

IMAGE_NAME="alb"
IMAGE_DESCRIPTION="ALB VM with HAProxy and alb-agent"
ALPINE_VERSION="3.21.6"
IMAGE_SIZE="512M"

# Packages to install via apk
APK_PACKAGES="haproxy curl"

# Binaries to copy into the image (source:destination)
INSTALL_BINARIES="bin/alb-agent:/usr/local/bin/alb-agent"

# Build command for binaries (run before image build)
BUILD_COMMANDS="make build-alb-agent"

# OpenRC services to enable at boot
ENABLE_SERVICES="haproxy"

# Custom setup script (runs inside chroot after packages are installed)
SETUP_SCRIPT="scripts/images/alb-setup.sh"
