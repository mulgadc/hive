version: 2
updates:
  - package-ecosystem: gomod
    target-branch: dev
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Australia/Sydney
    cooldown:
      default-days: 1
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Australia/Sydney
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    target-branch: dev
    directory: /spinifex/services/spinifexui/frontend
    schedule:
      interval: weekly
      day: monday
      timezone: Australia/Sydney
    cooldown:
      default-days: 1
    groups:
      npm-dependencies:
        patterns:
          - "*"
