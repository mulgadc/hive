<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#7F1D1D;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#7F1D1D;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="mulga-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#7F1D1D;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#F87171;stop-opacity:0.45" />
      <stop offset="100%" style="stop-color:#7F1D1D;stop-opacity:0" />
    </linearGradient>
    <filter id="node-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="900" height="300" fill="url(#vignette)" rx="12"/>

  <!-- Mesh network background (mulgadc style) -->
  <g opacity="0.35">
    <!-- Connections (drawn first, under nodes) -->
    <g stroke="#7F1D1D" stroke-width="0.6" fill="none">
      <line x1="80" y1="60" x2="200" y2="40"/>
      <line x1="80" y1="60" x2="150" y2="140"/>
      <line x1="200" y1="40" x2="330" y2="90"/>
      <line x1="150" y1="140" x2="260" y2="180"/>
      <line x1="150" y1="140" x2="60" y2="220"/>
      <line x1="330" y1="90" x2="260" y2="180"/>
      <line x1="260" y1="180" x2="120" y2="260"/>
      <line x1="60" y1="220" x2="120" y2="260"/>

      <line x1="620" y1="50" x2="760" y2="90"/>
      <line x1="620" y1="50" x2="700" y2="160"/>
      <line x1="760" y1="90" x2="850" y2="160"/>
      <line x1="700" y1="160" x2="820" y2="220"/>
      <line x1="850" y1="160" x2="820" y2="220"/>
      <line x1="700" y1="160" x2="600" y2="240"/>
      <line x1="600" y1="240" x2="820" y2="220"/>
      <line x1="760" y1="90" x2="700" y2="160"/>
    </g>
    <!-- Nodes -->
    <g fill="#DC2626">
      <circle cx="80" cy="60" r="2.5"/>
      <circle cx="200" cy="40" r="2"/>
      <circle cx="330" cy="90" r="2.5"/>
      <circle cx="150" cy="140" r="3"/>
      <circle cx="260" cy="180" r="2"/>
      <circle cx="60" cy="220" r="2"/>
      <circle cx="120" cy="260" r="2.5"/>

      <circle cx="620" cy="50" r="2"/>
      <circle cx="760" cy="90" r="3"/>
      <circle cx="700" cy="160" r="2.5"/>
      <circle cx="850" cy="160" r="2"/>
      <circle cx="820" cy="220" r="2.5"/>
      <circle cx="600" cy="240" r="2"/>
    </g>
    <!-- Pulse rings (static "about-to-pulse" look) -->
    <g fill="none" stroke="#F87171" stroke-width="0.8" opacity="0.5">
      <circle cx="150" cy="140" r="6"/>
      <circle cx="760" cy="90" r="6"/>
      <circle cx="700" cy="160" r="8"/>
    </g>
  </g>

  <!-- Main emblem: cluster-node stack with NATS bus -->
  <g transform="translate(200, 150)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="64" fill="none" stroke="url(#mulga-grad)" stroke-width="1.5" opacity="0.35" filter="url(#node-glow)"/>

    <!-- Top node -->
    <rect x="-24" y="-52" width="48" height="22" rx="3" fill="none" stroke="#DC2626" stroke-width="1.8"/>
    <circle cx="-16" cy="-41" r="1.6" fill="#F87171"/>
    <circle cx="-8" cy="-41" r="1.6" fill="#F87171"/>
    <line x1="0" y1="-41" x2="16" y2="-41" stroke="#F87171" stroke-width="0.9" opacity="0.6"/>

    <!-- Middle node (active) -->
    <rect x="-30" y="-14" width="60" height="28" rx="3" fill="url(#mulga-grad)" opacity="0.22" stroke="#DC2626" stroke-width="2"/>
    <circle cx="-20" cy="0" r="2" fill="#F87171"/>
    <circle cx="-10" cy="0" r="2" fill="#F87171"/>
    <line x1="-2" y1="0" x2="22" y2="0" stroke="#F87171" stroke-width="1.2" opacity="0.8"/>

    <!-- Bottom node -->
    <rect x="-24" y="30" width="48" height="22" rx="3" fill="none" stroke="#7F1D1D" stroke-width="1.8"/>
    <circle cx="-16" cy="41" r="1.6" fill="#DC2626"/>
    <circle cx="-8" cy="41" r="1.6" fill="#DC2626"/>
    <line x1="0" y1="41" x2="16" y2="41" stroke="#DC2626" stroke-width="0.9" opacity="0.6"/>

    <!-- Radiating mesh ports -->
    <g stroke-width="0.9" opacity="0.55">
      <line x1="-30" y1="0" x2="-58" y2="-26" stroke="#DC2626"/>
      <line x1="-30" y1="0" x2="-64" y2="0" stroke="#DC2626"/>
      <line x1="-30" y1="0" x2="-58" y2="26" stroke="#DC2626"/>
      <line x1="30" y1="0" x2="58" y2="-26" stroke="#7F1D1D"/>
      <line x1="30" y1="0" x2="64" y2="0" stroke="#7F1D1D"/>
      <line x1="30" y1="0" x2="58" y2="26" stroke="#7F1D1D"/>
    </g>
    <g fill="#F87171">
      <circle cx="-58" cy="-26" r="2.5"/>
      <circle cx="-64" cy="0" r="2.5"/>
      <circle cx="-58" cy="26" r="2.5"/>
    </g>
    <g fill="#DC2626">
      <circle cx="58" cy="-26" r="2.5"/>
      <circle cx="64" cy="0" r="2.5"/>
      <circle cx="58" cy="26" r="2.5"/>
    </g>
  </g>

  <!-- Title -->
  <text x="340" y="120" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#f5f5f5" letter-spacing="-1.5">Spinifex</text>

  <!-- Subtitle -->
  <text x="340" y="155" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="17" fill="#a1a1aa" letter-spacing="0.3">Open-source AWS-compatible platform</text>
  <text x="340" y="180" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="17" fill="#a1a1aa" letter-spacing="0.3">for secure edge deployments</text>

  <!-- Rule -->
  <rect x="340" y="200" width="440" height="1" fill="url(#rule)" rx="1"/>

  <!-- Service pills -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">
    <rect x="340" y="215" width="50" height="24" rx="12" fill="#7F1D1D" fill-opacity="0.25" stroke="#DC2626" stroke-width="0.5" stroke-opacity="0.55"/>
    <text x="365" y="231" fill="#F87171" text-anchor="middle">EC2</text>

    <rect x="398" y="215" width="50" height="24" rx="12" fill="#7F1D1D" fill-opacity="0.25" stroke="#DC2626" stroke-width="0.5" stroke-opacity="0.55"/>
    <text x="423" y="231" fill="#F87171" text-anchor="middle">EBS</text>

    <rect x="456" y="215" width="45" height="24" rx="12" fill="#7F1D1D" fill-opacity="0.25" stroke="#DC2626" stroke-width="0.5" stroke-opacity="0.55"/>
    <text x="478" y="231" fill="#F87171" text-anchor="middle">S3</text>

    <rect x="509" y="215" width="55" height="24" rx="12" fill="#7F1D1D" fill-opacity="0.25" stroke="#DC2626" stroke-width="0.5" stroke-opacity="0.55"/>
    <text x="536" y="231" fill="#F87171" text-anchor="middle">VPC</text>

    <rect x="572" y="215" width="50" height="24" rx="12" fill="#7F1D1D" fill-opacity="0.25" stroke="#DC2626" stroke-width="0.5" stroke-opacity="0.55"/>
    <text x="597" y="231" fill="#F87171" text-anchor="middle">IAM</text>

    <rect x="630" y="215" width="78" height="24" rx="12" fill="#18181b" stroke="#52525b" stroke-width="0.5" stroke-opacity="0.8"/>
    <text x="669" y="231" fill="#a1a1aa" text-anchor="middle">Air-Gapped</text>
  </g>

  <!-- Tagline -->
  <text x="340" y="265" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" fill="#71717a" letter-spacing="1.8">YOUR INFRASTRUCTURE · YOUR HARDWARE · YOUR CLOUD</text>
</svg>
