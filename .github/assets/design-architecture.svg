<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="45%" style="stop-color:#1f2028"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="client-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb95022"/>
      <stop offset="100%" style="stop-color:#3fb95008"/>
    </linearGradient>
    <linearGradient id="gw-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC262633"/>
      <stop offset="100%" style="stop-color:#7F1D1D14"/>
    </linearGradient>
    <linearGradient id="nats-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F87171"/>
      <stop offset="50%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#7F1D1D"/>
    </linearGradient>
    <linearGradient id="daemon-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC262622"/>
      <stop offset="100%" style="stop-color:#7F1D1D0a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="720" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="24" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#a1a1aa" letter-spacing="2.5" font-weight="600">HIGH-LEVEL ARCHITECTURE</text>
  <text x="876" y="30" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#71717a" text-anchor="end">SDK → Gateway → NATS → Daemons → VMs</text>

  <!-- ═══ AWS SDK / CLI ══════════════════════════════════ -->
  <rect x="16" y="50" width="868" height="76" rx="8" fill="url(#client-grad)" stroke="#3fb950" stroke-width="1" stroke-opacity="0.5"/>
  <text x="32" y="72" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#3fb950" font-weight="700" letter-spacing="1">AWS SDK / CLI</text>
  <text x="32" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a1a1aa">Users interact with Spinifex using standard AWS SDKs and CLIs against a custom endpoint URL</text>
  <g font-family="'SF Mono', ui-monospace, monospace" font-size="10.5">
    <rect x="32" y="98" width="480" height="20" rx="4" fill="#0a0a0a" stroke="#3fb950" stroke-width="0.6" stroke-opacity="0.4"/>
    <text x="42" y="112" fill="#7ee787">$ aws ec2 run-instances --endpoint-url https://localhost:9999 ...</text>
  </g>

  <!-- Connector: HTTPS + SigV4 -->
  <line x1="450" y1="126" x2="450" y2="154" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.7"/>
  <rect x="380" y="128" width="140" height="20" rx="10" fill="#0a0a0a" stroke="#DC2626" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="450" y="142" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#F87171" text-anchor="middle">HTTPS · SigV4 Auth</text>

  <!-- ═══ AWS GATEWAY ════════════════════════════════════ -->
  <rect x="16" y="154" width="868" height="104" rx="8" fill="url(#gw-grad)" stroke="#DC2626" stroke-width="1.3" stroke-opacity="0.75"/>
  <text x="32" y="176" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#F87171" font-weight="700" letter-spacing="1">AWS GATEWAY · port 9999</text>
  <text x="876" y="176" font-family="'SF Mono', ui-monospace, monospace" font-size="9" fill="#71717a" text-anchor="end">spinifex/services/awsgw/awsgw.go</text>

  <!-- Two-column feature bullets -->
  <g font-family="'Segoe UI', sans-serif" font-size="10.5" fill="#f5f5f5">
    <text x="40" y="200">● TLS termination</text>
    <text x="40" y="220">● EC2 Query Protocol parsing</text>
    <text x="40" y="240">● XML response generation</text>

    <text x="460" y="200">● AWS SigV4 authentication</text>
    <text x="460" y="220">● Routes to service handlers</text>
    <text x="460" y="240">● NATS client connection</text>
  </g>

  <!-- Connector: JSON over NATS -->
  <line x1="450" y1="258" x2="450" y2="286" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.7"/>
  <rect x="380" y="260" width="140" height="20" rx="10" fill="#0a0a0a" stroke="#DC2626" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="450" y="274" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#F87171" text-anchor="middle">JSON over NATS</text>

  <!-- ═══ NATS BROKER ═══════════════════════════════════ -->
  <rect x="16" y="286" width="868" height="124" rx="8" fill="#1a0a0a" stroke="#DC2626" stroke-width="1.2" stroke-opacity="0.65"/>
  <rect x="16" y="286" width="868" height="28" rx="8" fill="url(#nats-grad)" opacity="0.9"/>
  <text x="32" y="305" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#f5f5f5" font-weight="700" letter-spacing="1.5">NATS MESSAGE BROKER</text>
  <text x="876" y="305" font-family="'SF Mono', ui-monospace, monospace" font-size="9" fill="#fee2e2" text-anchor="end" opacity="0.9">request/reply · queue groups · fan-out</text>

  <!-- Two-column topics/queue groups -->
  <g font-family="'SF Mono', ui-monospace, monospace" font-size="10">
    <text x="40" y="332" fill="#F87171" font-weight="600">Topics</text>
    <text x="40" y="350" fill="#f5f5f5">ec2.RunInstances</text>
    <text x="40" y="368" fill="#f5f5f5">ec2.DescribeInstances</text>
    <text x="40" y="386" fill="#f5f5f5">ec2.cmd.{instanceID}</text>
    <text x="40" y="404" fill="#f5f5f5">ebs.mount  ·  ebs.unmount</text>

    <text x="460" y="332" fill="#F87171" font-weight="600">Delivery mode</text>
    <text x="460" y="350" fill="#a1a1aa">spinifex-workers <tspan fill="#71717a">(load-balanced)</tspan></text>
    <text x="460" y="368" fill="#a1a1aa">no queue group <tspan fill="#71717a">(fan-out to all nodes)</tspan></text>
    <text x="460" y="386" fill="#a1a1aa">per-instance <tspan fill="#71717a">(start / stop / terminate)</tspan></text>
    <text x="460" y="404" fill="#a1a1aa">Viperblock request/reply</text>
  </g>

  <!-- Fan-out connectors to 3 daemons -->
  <g stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.6" fill="none">
    <line x1="450" y1="410" x2="450" y2="430"/>
    <line x1="450" y1="430" x2="155" y2="452"/>
    <line x1="450" y1="430" x2="450" y2="452"/>
    <line x1="450" y1="430" x2="745" y2="452"/>
  </g>

  <!-- ═══ DAEMON ROW ════════════════════════════════════ -->
  <!-- Daemon 1 -->
  <g transform="translate(32, 452)">
    <rect width="246" height="124" rx="8" fill="url(#daemon-grad)" stroke="#DC2626" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="20" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#F87171" font-weight="700">Spinifex Daemon</text>
    <text x="226" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#a1a1aa" text-anchor="end">Node 1</text>
    <line x1="16" y1="32" x2="230" y2="32" stroke="#DC2626" stroke-opacity="0.25" stroke-width="0.5"/>
    <g font-family="'Segoe UI', sans-serif" font-size="10.5" fill="#f5f5f5">
      <text x="20" y="52">● NATS subscriber</text>
      <text x="20" y="70">● Resource manager</text>
      <text x="20" y="88">● QEMU/KVM launcher</text>
      <text x="20" y="106">● QMP monitoring</text>
    </g>
    <text x="20" y="119" font-family="'SF Mono', ui-monospace, monospace" font-size="9" fill="#71717a">daemon.go</text>
  </g>

  <!-- Daemon 2 -->
  <g transform="translate(327, 452)">
    <rect width="246" height="124" rx="8" fill="url(#daemon-grad)" stroke="#DC2626" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="20" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#F87171" font-weight="700">Spinifex Daemon</text>
    <text x="226" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#a1a1aa" text-anchor="end">Node 2</text>
    <line x1="16" y1="32" x2="230" y2="32" stroke="#DC2626" stroke-opacity="0.25" stroke-width="0.5"/>
    <g font-family="'Segoe UI', sans-serif" font-size="10.5" fill="#f5f5f5">
      <text x="20" y="52">● NATS subscriber</text>
      <text x="20" y="70">● Resource manager</text>
      <text x="20" y="88">● QEMU/KVM launcher</text>
      <text x="20" y="106">● QMP monitoring</text>
    </g>
    <text x="20" y="119" font-family="'SF Mono', ui-monospace, monospace" font-size="9" fill="#71717a">daemon.go</text>
  </g>

  <!-- Daemon N -->
  <g transform="translate(622, 452)">
    <rect width="246" height="124" rx="8" fill="url(#daemon-grad)" stroke="#DC2626" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="20" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#F87171" font-weight="700">Spinifex Daemon</text>
    <text x="226" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#a1a1aa" text-anchor="end">Node N</text>
    <line x1="16" y1="32" x2="230" y2="32" stroke="#DC2626" stroke-opacity="0.25" stroke-width="0.5"/>
    <g font-family="'Segoe UI', sans-serif" font-size="10.5" fill="#f5f5f5">
      <text x="20" y="52">● NATS subscriber</text>
      <text x="20" y="70">● Resource manager</text>
      <text x="20" y="88">● QEMU/KVM launcher</text>
      <text x="20" y="106">● QMP monitoring</text>
    </g>
    <text x="20" y="119" font-family="'SF Mono', ui-monospace, monospace" font-size="9" fill="#71717a">daemon.go</text>
  </g>

  <!-- Daemon → VM connectors -->
  <g stroke="#71717a" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.55" fill="none">
    <line x1="155" y1="576" x2="155" y2="610"/>
    <line x1="450" y1="576" x2="450" y2="610"/>
    <line x1="745" y1="576" x2="745" y2="610"/>
  </g>

  <!-- ═══ VM BAR + ROW ═══════════════════════════════════ -->
  <rect x="16" y="610" width="868" height="22" rx="5" fill="url(#bar-grad)"/>
  <text x="450" y="625" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#a1a1aa" text-anchor="middle" letter-spacing="1.5">WORKLOADS · QEMU/KVM virtual machines per node</text>

  <!-- VM boxes -->
  <g font-family="'SF Mono', ui-monospace, monospace" font-size="11">
    <rect x="32" y="642" width="246" height="60" rx="7" fill="#27272a" fill-opacity="0.7" stroke="#71717a" stroke-width="1" stroke-opacity="0.6"/>
    <text x="155" y="665" fill="#e4e4e7" text-anchor="middle" font-weight="600">QEMU / KVM VMs</text>
    <text x="155" y="683" fill="#a1a1aa" text-anchor="middle" font-size="9.5">virtio-blk · virtio-net · cloud-init</text>
    <text x="155" y="695" fill="#71717a" text-anchor="middle" font-size="9">Node 1 workloads</text>

    <rect x="327" y="642" width="246" height="60" rx="7" fill="#27272a" fill-opacity="0.7" stroke="#71717a" stroke-width="1" stroke-opacity="0.6"/>
    <text x="450" y="665" fill="#e4e4e7" text-anchor="middle" font-weight="600">QEMU / KVM VMs</text>
    <text x="450" y="683" fill="#a1a1aa" text-anchor="middle" font-size="9.5">virtio-blk · virtio-net · cloud-init</text>
    <text x="450" y="695" fill="#71717a" text-anchor="middle" font-size="9">Node 2 workloads</text>

    <rect x="622" y="642" width="246" height="60" rx="7" fill="#27272a" fill-opacity="0.7" stroke="#71717a" stroke-width="1" stroke-opacity="0.6"/>
    <text x="745" y="665" fill="#e4e4e7" text-anchor="middle" font-weight="600">QEMU / KVM VMs</text>
    <text x="745" y="683" fill="#a1a1aa" text-anchor="middle" font-size="9.5">virtio-blk · virtio-net · cloud-init</text>
    <text x="745" y="695" fill="#71717a" text-anchor="middle" font-size="9">Node N workloads</text>
  </g>
</svg>
