<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="cluster-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb95022"/>
      <stop offset="100%" style="stop-color:#3fb95008"/>
    </linearGradient>
    <linearGradient id="pool-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC262622"/>
      <stop offset="100%" style="stop-color:#7F1D1D08"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff22"/>
      <stop offset="100%" style="stop-color:#58a6ff08"/>
    </linearGradient>
  </defs>
  <rect width="900" height="330" fill="url(#bg)" rx="12"/>

  <text x="24" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#a1a1aa" letter-spacing="2.5" font-weight="600">CONFIGURATION LEVELS · spinifex.toml</text>
  <text x="876" y="30" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#71717a" text-anchor="end">three scopes: cluster · pool · node</text>

  <!-- File badge -->
  <rect x="24" y="50" width="140" height="24" rx="6" fill="#161b22" stroke="#52525b" stroke-width="0.6"/>
  <text x="94" y="67" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#e4e4e7" text-anchor="middle">spinifex.toml</text>

  <!-- spine -->
  <line x1="52" y1="74" x2="52" y2="298" stroke="#52525b" stroke-width="1" opacity="0.6"/>

  <!-- ═══ Level 1: [network] cluster-wide ═══════════════════ -->
  <line x1="52" y1="108" x2="92" y2="108" stroke="#52525b" stroke-width="1" opacity="0.6"/>
  <rect x="92" y="86" width="764" height="56" rx="8" fill="url(#cluster-grad)" stroke="#3fb950" stroke-width="1.2" stroke-opacity="0.55"/>
  <text x="108" y="108" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#3fb950" font-weight="700">[network]</text>
  <text x="220" y="108" font-family="'Segoe UI', sans-serif" font-size="11" fill="#f5f5f5">Cluster-wide · which mode?</text>
  <g font-family="'SF Mono', ui-monospace, monospace" font-size="10">
    <text x="108" y="128" fill="#a1a1aa">└─</text>
    <text x="128" y="128" fill="#7ee787">external_mode</text>
    <text x="224" y="128" fill="#a1a1aa">=</text>
    <text x="238" y="128" fill="#f5f5f5">"pool"</text>
  </g>

  <!-- ═══ Level 2: [[network.external_pools]] ═══════════════ -->
  <line x1="52" y1="176" x2="92" y2="176" stroke="#52525b" stroke-width="1" opacity="0.6"/>
  <rect x="92" y="154" width="764" height="78" rx="8" fill="url(#pool-grad)" stroke="#DC2626" stroke-width="1.2" stroke-opacity="0.65"/>
  <text x="108" y="176" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#F87171" font-weight="700">[[network.external_pools]]</text>
  <text x="328" y="176" font-family="'Segoe UI', sans-serif" font-size="11" fill="#f5f5f5">IP ranges · what IPs to use?</text>
  <g font-family="'SF Mono', ui-monospace, monospace" font-size="10">
    <text x="108" y="196" fill="#a1a1aa">├─</text>
    <text x="128" y="196" fill="#FCA5A5">name</text>
    <text x="158" y="196" fill="#71717a">·</text>
    <text x="166" y="196" fill="#FCA5A5">range_start</text>
    <text x="246" y="196" fill="#71717a">·</text>
    <text x="254" y="196" fill="#FCA5A5">range_end</text>

    <text x="108" y="212" fill="#a1a1aa">├─</text>
    <text x="128" y="212" fill="#FCA5A5">gateway</text>
    <text x="182" y="212" fill="#71717a">·</text>
    <text x="190" y="212" fill="#FCA5A5">prefix_len</text>

    <text x="108" y="228" fill="#a1a1aa">└─</text>
    <text x="128" y="228" fill="#FCA5A5">region</text>
    <text x="174" y="228" fill="#71717a">·</text>
    <text x="182" y="228" fill="#FCA5A5">az</text>
    <text x="202" y="228" fill="#71717a">(optional)</text>
  </g>

  <!-- ═══ Level 3: [nodes.NAME.vpcd] ════════════════════════ -->
  <line x1="52" y1="268" x2="92" y2="268" stroke="#52525b" stroke-width="1" opacity="0.6"/>
  <rect x="92" y="246" width="764" height="56" rx="8" fill="url(#node-grad)" stroke="#58a6ff" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="108" y="268" font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#58a6ff" font-weight="700">[nodes.NAME.vpcd]</text>
  <text x="266" y="268" font-family="'Segoe UI', sans-serif" font-size="11" fill="#f5f5f5">Per-node · which NIC?</text>
  <g font-family="'SF Mono', ui-monospace, monospace" font-size="10">
    <text x="108" y="288" fill="#a1a1aa">└─</text>
    <text x="128" y="288" fill="#8ab4f8">external_interface</text>
  </g>
</svg>
