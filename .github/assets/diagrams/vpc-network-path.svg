<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="wan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb95022"/>
      <stop offset="100%" style="stop-color:#3fb95008"/>
    </linearGradient>
    <linearGradient id="ovs-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff22"/>
      <stop offset="100%" style="stop-color:#58a6ff0a"/>
    </linearGradient>
    <linearGradient id="router-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC262622"/>
      <stop offset="100%" style="stop-color:#7F1D1D0a"/>
    </linearGradient>
    <linearGradient id="pub-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb95022"/>
      <stop offset="100%" style="stop-color:#3fb95008"/>
    </linearGradient>
    <linearGradient id="priv-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f722"/>
      <stop offset="100%" style="stop-color:#a855f708"/>
    </linearGradient>
  </defs>

  <rect width="900" height="560" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="24" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#a1a1aa" letter-spacing="2.5" font-weight="600">NETWORK PATH</text>
  <text x="876" y="30" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#71717a" text-anchor="end">OVN logical topology · bridge mapping · NAT</text>

  <!-- WAN -->
  <rect x="300" y="54" width="300" height="40" rx="8" fill="url(#wan-grad)" stroke="#3fb950" stroke-width="1" stroke-opacity="0.55"/>
  <text x="450" y="78" font-family="'SF Mono', ui-monospace, monospace" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="700">Physical Network (WAN)</text>

  <!-- connector -->
  <line x1="450" y1="94" x2="450" y2="112" stroke="#71717a" stroke-width="1" opacity="0.5"/>

  <!-- br-wan bridge -->
  <rect x="340" y="112" width="220" height="52" rx="8" fill="url(#ovs-grad)" stroke="#58a6ff" stroke-width="1.2" stroke-opacity="0.65"/>
  <text x="450" y="134" font-family="'SF Mono', ui-monospace, monospace" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="700">br-wan</text>
  <text x="450" y="152" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a1a1aa" text-anchor="middle">OVS bridge · physical uplink</text>

  <!-- connector with bridge-mappings label -->
  <line x1="450" y1="164" x2="450" y2="186" stroke="#71717a" stroke-width="1" opacity="0.5"/>
  <rect x="316" y="170" width="268" height="18" rx="9" fill="#0a0a0a" stroke="#58a6ff" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="450" y="183" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#8ab4f8" text-anchor="middle">ovn-bridge-mappings: external:br-wan</text>

  <!-- VPC Logical Router (the big box) -->
  <rect x="60" y="208" width="780" height="196" rx="10" fill="url(#router-grad)" stroke="#DC2626" stroke-width="1.4" stroke-opacity="0.75"/>
  <text x="78" y="232" font-family="'SF Mono', ui-monospace, monospace" font-size="13" fill="#F87171" font-weight="700" letter-spacing="1">VPC LOGICAL ROUTER</text>
  <line x1="60" y1="242" x2="840" y2="242" stroke="#DC2626" stroke-opacity="0.25" stroke-width="0.5"/>

  <!-- Router ports row -->
  <g font-family="'SF Mono', ui-monospace, monospace" font-size="11">
    <rect x="82" y="254" width="120" height="42" rx="5" fill="#0d1117" stroke="#F87171" stroke-opacity="0.6" stroke-width="0.8"/>
    <text x="142" y="270" fill="#F87171" text-anchor="middle" font-weight="600">Gateway port</text>
    <text x="142" y="286" fill="#a1a1aa" text-anchor="middle" font-size="9.5">public IP</text>

    <text x="215" y="282" fill="#71717a">─────</text>

    <rect x="260" y="254" width="120" height="42" rx="5" fill="#0d1117" stroke="#F87171" stroke-opacity="0.6" stroke-width="0.8"/>
    <text x="320" y="270" fill="#F87171" text-anchor="middle" font-weight="600">ext switch</text>
    <text x="320" y="286" fill="#a1a1aa" text-anchor="middle" font-size="9.5">OVN logical</text>

    <text x="393" y="282" fill="#71717a">─────</text>

    <rect x="438" y="254" width="120" height="42" rx="5" fill="#0d1117" stroke="#F87171" stroke-opacity="0.6" stroke-width="0.8"/>
    <text x="498" y="270" fill="#F87171" text-anchor="middle" font-weight="600">localnet port</text>
    <text x="498" y="286" fill="#a1a1aa" text-anchor="middle" font-size="9.5">→ br-wan</text>
  </g>

  <!-- NAT rules + Routes, two columns on right -->
  <g font-family="'SF Mono', ui-monospace, monospace" font-size="10.5">
    <text x="598" y="260" fill="#F87171" font-weight="600">NAT rules</text>
    <text x="598" y="276" fill="#f5f5f5">SNAT:</text>
    <text x="644" y="276" fill="#a1a1aa">VPC CIDR → gw IP</text>
    <text x="598" y="292" fill="#f5f5f5">dnat_and_snat:</text>
    <text x="704" y="292" fill="#a1a1aa">pub ↔ priv</text>
  </g>

  <g font-family="'SF Mono', ui-monospace, monospace" font-size="10.5">
    <text x="82" y="330" fill="#F87171" font-weight="600">Routes</text>
    <text x="82" y="346" fill="#f5f5f5">0.0.0.0/0</text>
    <text x="154" y="346" fill="#a1a1aa">→ WAN gateway</text>
  </g>

  <!-- Subnet branches inside router -->
  <line x1="150" y1="362" x2="150" y2="386" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="150" y1="386" x2="305" y2="386" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="305" y1="386" x2="305" y2="404" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>

  <line x1="150" y1="386" x2="515" y2="386" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="515" y1="386" x2="515" y2="404" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- Subnet A (public) -->
  <g transform="translate(215, 404)">
    <rect width="180" height="124" rx="8" fill="url(#pub-grad)" stroke="#3fb950" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="90" y="22" font-family="'SF Mono', ui-monospace, monospace" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="700">subnet-a</text>
    <text x="90" y="38" font-family="'Segoe UI', sans-serif" font-size="10" fill="#7ee787" text-anchor="middle">(public)</text>
    <line x1="16" y1="46" x2="164" y2="46" stroke="#3fb950" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="90" y="64" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#f5f5f5" text-anchor="middle">10.0.1.0/24</text>
    <g font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#a1a1aa">
      <circle cx="40" cy="88" r="2.5" fill="#3fb950"/>
      <text x="52" y="92">eni-1</text>
      <circle cx="40" cy="108" r="2.5" fill="#3fb950"/>
      <text x="52" y="112">eni-2</text>
    </g>
  </g>

  <!-- Subnet B (private) -->
  <g transform="translate(425, 404)">
    <rect width="180" height="124" rx="8" fill="url(#priv-grad)" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="90" y="22" font-family="'SF Mono', ui-monospace, monospace" font-size="13" fill="#c084fc" text-anchor="middle" font-weight="700">subnet-b</text>
    <text x="90" y="38" font-family="'Segoe UI', sans-serif" font-size="10" fill="#d8b4fe" text-anchor="middle">(private)</text>
    <line x1="16" y1="46" x2="164" y2="46" stroke="#a855f7" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="90" y="64" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#f5f5f5" text-anchor="middle">10.0.2.0/24</text>
    <g font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#a1a1aa">
      <circle cx="40" cy="88" r="2.5" fill="#a855f7"/>
      <text x="52" y="92">eni-3</text>
      <circle cx="40" cy="108" r="2.5" fill="#a855f7"/>
      <text x="52" y="112">eni-4</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="24" y="548" font-family="'Segoe UI', sans-serif" font-size="10" fill="#71717a">Cross-host traffic uses Geneve tunnels (UDP 6081) over the overlay NIC · ovn-controller programs OpenFlow rules on br-int</text>
</svg>
