<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="900" height="110" fill="url(#bg)" rx="10"/>

  <text x="24" y="24" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#a1a1aa" letter-spacing="2" font-weight="600">PRIVATE SUBNET · no default route</text>

  <!-- Instance -->
  <g transform="translate(40, 42)">
    <rect width="180" height="44" rx="7" fill="#a855f71a" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="90" y="20" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="700">Instance</text>
    <text x="90" y="34" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#d8b4fe" text-anchor="middle">10.0.2.5</text>
  </g>

  <!-- arrow -->
  <g stroke="#DC2626" stroke-width="1.2" opacity="0.6" fill="none">
    <line x1="220" y1="64" x2="260" y2="64" stroke-dasharray="3,3"/>
  </g>
  <polygon points="260,60 268,64 260,68" fill="#DC2626" opacity="0.6"/>

  <!-- Router -->
  <g transform="translate(275, 42)">
    <rect width="180" height="44" rx="7" fill="#DC26261a" stroke="#DC2626" stroke-width="1.2" stroke-opacity="0.65"/>
    <text x="90" y="20" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#F87171" text-anchor="middle" font-weight="700">VPC Router</text>
    <text x="90" y="34" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#FCA5A5" text-anchor="middle">lookup 0.0.0.0/0</text>
  </g>

  <!-- arrow -->
  <g stroke="#DC2626" stroke-width="1.2" opacity="0.6" fill="none">
    <line x1="455" y1="64" x2="495" y2="64" stroke-dasharray="3,3"/>
  </g>
  <polygon points="495,60 503,64 495,68" fill="#DC2626" opacity="0.6"/>

  <!-- [no default route] -->
  <g transform="translate(510, 42)">
    <rect width="196" height="44" rx="7" fill="#0a0a0a" stroke="#71717a" stroke-width="1" stroke-opacity="0.7" stroke-dasharray="4,3"/>
    <text x="98" y="20" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#a1a1aa" text-anchor="middle" font-weight="600">[no default route]</text>
    <text x="98" y="34" font-family="'SF Mono', ui-monospace, monospace" font-size="10" fill="#71717a" text-anchor="middle">no IGW attached</text>
  </g>

  <!-- arrow to dropped -->
  <g stroke="#71717a" stroke-width="1.2" opacity="0.6" fill="none">
    <line x1="706" y1="64" x2="746" y2="64" stroke-dasharray="3,3"/>
  </g>
  <polygon points="746,60 754,64 746,68" fill="#71717a" opacity="0.6"/>

  <!-- dropped -->
  <g transform="translate(760, 42)">
    <rect width="116" height="44" rx="7" fill="#27272a" stroke="#52525b" stroke-width="1" stroke-opacity="0.7"/>
    <text x="58" y="27" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#a1a1aa" text-anchor="middle" font-weight="600">dropped</text>
  </g>
</svg>
