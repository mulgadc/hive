name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  distro:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Spinifex
        uses: actions/checkout@v6
        with:
          path: spinifex

      - name: Checkout Predastore
        uses: actions/checkout@v6
        with:
          repository: mulgadc/predastore
          path: predastore

      - name: Checkout Viperblock
        uses: actions/checkout@v6
        with:
          repository: mulgadc/viperblock
          path: viperblock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Build distribution tarballs
        run: cd spinifex cd hive &&cd hive && make distro VERSION=${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            spinifex/dist/*.tar.gz
            spinifex/dist/*.sha256
            spinifex/scripts/setup.sh
          generate_release_notes: true
